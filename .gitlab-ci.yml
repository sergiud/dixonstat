default:
  tags:
    - docker
  image: alpine

before_script:
  - apk add
    curl
    py3-coverage
    py3-numpy
    py3-pytest
    py3-pytest-benchmark
    py3-scipy

test:
  script:
    - coverage run -m pytest --junitxml pytest.xml
    - coverage combine
    - coverage report
    - coverage xml
  coverage: '/TOTAL.+ ([0-9]{1,3}%)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      junit: pytest.xml

benchmark:
  script:
    - python3 -m pytest --benchmark-only --benchmark-json=benchmark.json
    - >
      curl --silent --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}"
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/jobs/artifacts/${CI_DEFAULT_BRANCH}/raw/benchmark.json?job=benchmark"
      --output baseline.json
      || echo 'no baseline benchmark artifact found on the default branch yet'
    - python3 scripts/compare_benchmarks.py baseline.json benchmark.json --threshold 2.0
  artifacts:
    when: always
    paths:
      - benchmark.json
